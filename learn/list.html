<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>
<body>
    <!-- ordered list -->
    <ol>
        <li>one</li>
        <li>two</li>
        <li>three</li>
    </ol>

    <!-- unordered list -->
    <ul>
        <li>one</li>
        <li>two</li>
        <li>three</li>
    </ul>


    <!-- definition lis -->
    <dl>
        <dt>one
            <dd>this is one</dd>
        </dt>
        <dt>two
            <dd>this is two</dd>
        </dt>
    </dl>
    
</body>
</html>
