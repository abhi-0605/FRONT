<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: #414141;
            color: white;
        }
    </style>
</head>
<body>
    <h1>form in html</h1>
    <form action="url" method="get" accept-charset="UTF-8" autocomplete="off" novalidate target="_blank">

        <label for="fname"> first name</label>
        <input type="text" placeholder="enter your name " id="fname">
        <br>
        <label for="lname"> last name</label>
        <input type="text" placeholder="enter your name " id="lname" value="sharma">

        <input type="reset" value="reset">
        <input type="week" name="" id="">
        <input type="email" name="" id="">
        <br>
        <select name="editors" id="">
            <option value="vscode">vscode</option>
            <option value="subline">subline </option>
        </select>

        <input list="editors" name="editors">
        <datalist id="editors">
            <option value="vscode">vscode</option>
            <option value="subline">subline </option>
        </datalist>

        <br>

        <input type="hidden" name="">

        <input type="radio" name="yes" id="">yes 
        

        <br>
        <button type="submit">submit</button>

    </form>
</body>
</html>
