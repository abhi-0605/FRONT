<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>unordered list</h1>
    <ul style="list-style-type: square;">
        <li>1
            <ul>
                <li>h1</li>
                <li>h2</li>
            </ul>
        </li>
        <li>2</li>
        <li>3</li>
        <li>4</li>
        <li>5</li>
    </ul>

    <!-- ordered list -->
    <ol type="I">
        <li>1</li>
        <li>2</li>
        <li>3</li>
        <li>4</li>
        <li>5</li>
    </ol>

    <!-- data list -->
     <dl>
        <dt>1</dt>
        <dd>11</dd>
        <dd>111</dd>
        
     </dl>


     <h3>head 1</h3>
     <p>head 2</p>

</body>
</html>
