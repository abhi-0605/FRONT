<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login form UI</title>
    <link rel="stylesheet" href="Login_form_UI.css">
</head>
<body>
    <div class="container">
        <h2>Login</h2>

        <form action="">

            <div class="input">
                <label for=""><b>Email</b></label>
                <input type="email" placeholder="enter your name" id="" required>
            </div>

            <div class="input">
                <label for=""><b>Password</b></label>
                <input type="password" name="" id="" required placeholder="enter your password">
            </div>

            <button type="submit" class="btn">Login</button>

            <div class="forget">
                <p>forget password <a href="#"> Reset</a></p>
            </div>

        </form>
    </div>
</body>
</html>
