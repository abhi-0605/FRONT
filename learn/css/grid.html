<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Form</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to right, #4facfe, #00f2fe);
    }

    .container{
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 10px;
  }

  .box{
    background: orange;
    padding: 10px;
  }
  </style>
</head>

<body>

  <div class="container">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
    <!-- <div class="box">3</div>
    <div class="box">3</div>
    <div class="box">3</div> -->
</div>

</body>
</html>
